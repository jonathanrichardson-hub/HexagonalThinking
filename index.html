<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hexagonal Thinking</title>
    <style>
        :root { --hex-scale: 1; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #F4EBE1; margin: 0; overflow: hidden; color: #4A3F35; 
        }

        #pageHeader { text-align: center; padding: 20px; background-color: #F4EBE1; }
        #pageHeader h1 { margin: 0 0 8px 0; font-size: 32px; color: #4A3F35; }
        #pageHeader p { margin: 0 auto; font-size: 15px; color: #7A6B5D; max-width: 700px; line-height: 1.5; }

        #controls {
            background-color: #4A3F35; color: #FDFBF7; padding: 15px 20px;
            display: flex; gap: 15px; align-items: flex-end; flex-wrap: wrap;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15); position: relative; z-index: 2000;
        }

        .control-group { display: flex; flex-direction: column; gap: 5px; }

        #wordList { height: 40px; width: 180px; border-radius: 6px; border: 1px solid #D4C5B9; padding: 5px 10px; font-family: inherit; }
        select, input[type="range"] { height: 40px; border-radius: 6px; border: 1px solid #D4C5B9; padding: 5px; font-family: inherit; background: white; cursor: pointer; }
        input[type="range"] { padding: 0; width: 120px; }

        button {
            background-color: #C18C5D; color: white; border: none; padding: 10px 18px; 
            border-radius: 6px; cursor: pointer; font-weight: 600; transition: all 0.2s ease; height: 40px;
        }
        button:hover { background-color: #A87A4F; transform: translateY(-1px); }
        .btn-mode { background-color: #6C809A; } 
        .btn-danger { background-color: #B05C52; } 
        .btn-export { background-color: #7A8B76; }
        .btn-export:hover { background-color: #5d6b5a; }
        .btn-pdf { background-color: #8C6239; }

        .tooltip-container { position: relative; display: inline-block; }
        .tooltip-text {
            visibility: hidden; width: 240px; background-color: #FDFBF7; color: #4A3F35; text-align: left; 
            border-radius: 8px; padding: 12px; position: absolute; z-index: 3000; top: 130%; left: 50%; 
            margin-left: -120px; opacity: 0; transition: opacity 0.3s; font-size: 13px; line-height: 1.5;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); border: 1px solid #E5DCD3; pointer-events: none;
        }
        .tooltip-container:hover .tooltip-text { visibility: visible; opacity: 1; }

        #board-wrapper { width: 100vw; height: calc(100vh - 180px); overflow: auto; background-color: #F4EBE1; }
        #board { 
            width: 3000px; height: 3000px; position: relative; 
            background-image: radial-gradient(#D4C5B9 1px, transparent 1px); background-size: 40px 40px;
        }

        .hexagon {
            width: calc(120px * var(--hex-scale)); height: calc(138px * var(--hex-scale));
            font-size: calc(13px * var(--hex-scale));
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; 
            text-align: center; padding: calc(15px * var(--hex-scale)); box-sizing: border-box; position: absolute;
            cursor: grab; user-select: none; box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            transition: background-color 0.4s ease, transform 0.1s; word-wrap: break-word; text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }
        .hexagon:active { cursor: grabbing; transform: scale(1.02); }

        #noteModal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: #FDFBF7; padding: 25px; border-radius: 12px; z-index: 3000; width: 400px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); border: 1px solid #E5DCD3;
        }
        #noteText { width: 100%; height: 120px; margin: 10px 0; padding: 10px; border-radius: 6px; border: 1px solid #D4C5B9; box-sizing: border-box;}
        #modalOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(74, 63, 53, 0.4); backdrop-filter: blur(2px); z-index: 2999; }
        .modal-buttons { display: flex; justify-content: space-between; margin-top: 10px; }

        @media print {
            body.printing-mode, body.printing-mode #board-wrapper { 
                overflow: visible !important; height: auto !important; width: auto !important; background: white !important; 
            }
            body.printing-mode #controls, body.printing-mode #pageHeader { display: none !important; }
            body.printing-mode #board { background-image: none !important; margin-bottom: 40px; }
            .hexagon { 
                -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; 
                box-shadow: none !important; border: 1px solid rgba(0,0,0,0.1);
            }
            #printNotesContainer { page-break-before: always; font-family: 'Segoe UI', sans-serif; }
        }
    </style>
</head>
<body>

    <header id="pageHeader">
        <h1>Hexagonal Thinking</h1>
        <p>Map your ideas. Use colors to categorize themes, and explain your logic by double-clicking.</p>
    </header>

    <div id="controls">
        <div class="control-group">
            <label style="font-size:11px; color:#E5DCD3;">Terms:</label>
            <textarea id="wordList" placeholder="Enter terms..."></textarea>
        </div>
        
        <div class="control-group">
            <label style="font-size:11px; color:#E5DCD3;">Theme Color:</label>
            <select id="colorPicker">
                <option value="clay">Clay (Warm Red)</option>
                <option value="slate">Slate (Blue-Grey)</option>
                <option value="ochre">Ochre (Gold)</option>
                <option value="moss">Moss (Muted Green)</option>
            </select>
        </div>

        <button onclick="spawnHexagons()">Spawn</button>

        <div class="control-group" style="margin-left: 10px;">
            <label style="font-size:11px; color:#E5DCD3;">Hexagon Size:</label>
            <input type="range" id="sizeSlider" min="0.5" max="1.5" step="0.1" value="1" oninput="updateSize()">
        </div>
        
        <div class="tooltip-container" style="margin-left: 10px;">
            <button id="dragModeBtn" class="btn-mode" onclick="toggleDragMode()">Mode: Move Groups</button>
            <div class="tooltip-text">
                <strong>How it works:</strong><br><br>
                • <strong>Move Groups:</strong> Dragging moves all attached hexagons.<br><br>
                • <strong>Move Singles:</strong> Detach a hexagon from its cluster.
            </div>
        </div>

        <button class="btn-export" onclick="downloadBoard()">Download File</button>
        <button class="btn-export" onclick="document.getElementById('fileInput').click()">Load File</button>
        <input type="file" id="fileInput" style="display: none;" accept=".hexmap" onchange="loadBoard(event)">
        
        <button class="btn-pdf" onclick="printNotes()">Print Notes (PDF)</button>
        <button class="btn-danger" onclick="clearBoard()">Clear</button>
    </div>

    <div id="board-wrapper">
        <div id="board"></div>
    </div>

    <div id="modalOverlay" onclick="closeModal()"></div>
    <div id="noteModal">
        <h3 id="modalTitle">Connections</h3>
        <label style="font-size:12px;">Hexagon Color:</label><br>
        <select id="modalColorPicker" style="width:100%; margin-top:5px;">
            <option value="clay">Clay (Warm Red)</option>
            <option value="slate">Slate (Blue-Grey)</option>
            <option value="ochre">Ochre (Gold)</option>
            <option value="moss">Moss (Muted Green)</option>
        </select>
        <p style="font-size: 13px; color: #7A6B5D; margin-top:15px;">Explanation:</p>
        <textarea id="noteText"></textarea>
        <div class="modal-buttons">
            <button onclick="saveNote()">Save & Close</button>
            <button class="btn-danger" onclick="deleteHexagon()">Delete</button>
        </div>
    </div>

    <script>
        const palette = {
            clay: ['#BA8E7A', '#829377'], slate: ['#6C809A', '#4A586E'], 
            ochre: ['#C18C5D', '#8C6239'], moss: ['#7A8B76', '#4E5B49']   
        };

        let hexagonsData = []; let activeHexId = null; let currentEditingId = null;
        let dragMode = 'group'; let currentScale = 1; 

        const board = document.getElementById('board');
        const boardWrapper = document.getElementById('board-wrapper');
        const dragModeBtn = document.getElementById('dragModeBtn');

        function updateSize() {
            currentScale = parseFloat(document.getElementById('sizeSlider').value);
            document.documentElement.style.setProperty('--hex-scale', currentScale);
        }

        function toggleDragMode() {
            if (dragMode === 'group') {
                dragMode = 'single'; dragModeBtn.innerText = "Mode: Move Singles"; dragModeBtn.style.backgroundColor = "#B05C52"; 
            } else {
                dragMode = 'group'; dragModeBtn.innerText = "Mode: Move Groups"; dragModeBtn.style.backgroundColor = "#6C809A"; 
            }
        }

        function spawnHexagons() {
            const text = document.getElementById('wordList').value;
            const theme = document.getElementById('colorPicker').value;
            const words = text.split(/[\n,]+/).map(w => w.trim()).filter(w => w.length > 0);
            const scrollX = boardWrapper.scrollLeft; const scrollY = boardWrapper.scrollTop;
            const viewWidth = boardWrapper.clientWidth; const viewHeight = boardWrapper.clientHeight;

            words.forEach((word, index) => {
                hexagonsData.push({
                    id: Date.now() + index, word: word,
                    x: scrollX + 100 + Math.floor(Math.random() * (viewWidth - 250)),
                    y: scrollY + 100 + Math.floor(Math.random() * (viewHeight - 250)),
                    notes: "", theme: theme
                });
            });
            document.getElementById('wordList').value = ""; renderBoard();
        }

        function renderBoard() {
            board.innerHTML = '';
            hexagonsData.forEach(hex => {
                const el = document.createElement('div');
                el.className = 'hexagon'; el.innerText = hex.word;
                el.style.left = hex.x + 'px'; el.style.top = hex.y + 'px'; el.dataset.id = hex.id;

                const colors = palette[hex.theme] || palette.clay;
                el.style.backgroundColor = hex.notes ? colors[1] : colors[0];

                el.addEventListener('pointerdown', handlePointerDown);
                el.addEventListener('dblclick', () => openModal(hex.id));
                board.appendChild(el);
            });
        }

        let startX, startY, clusterIds = [];

        function handlePointerDown(e) {
            activeHexId = parseInt(e.target.dataset.id);
            startX = e.clientX; startY = e.clientY;
            clusterIds = (dragMode === 'group') ? getConnectedCluster(activeHexId) : [activeHexId];
            document.addEventListener('pointermove', handlePointerMove);
            document.addEventListener('pointerup', handlePointerUp);
        }

        function handlePointerMove(e) {
            if (!activeHexId) return;
            const dx = e.clientX - startX; const dy = e.clientY - startY;
            clusterIds.forEach(id => {
                const hex = hexagonsData.find(h => h.id === id);
                hex.x += dx; hex.y += dy;
                const el = document.querySelector(`.hexagon[data-id='${id}']`);
                if(el) { el.style.left = hex.x + 'px'; el.style.top = hex.y + 'px'; el.style.zIndex = 1000; }
            });
            startX = e.clientX; startY = e.clientY;
        }

        function handlePointerUp() {
            clusterIds.forEach(id => {
                const el = document.querySelector(`.hexagon[data-id='${id}']`);
                if(el) el.style.zIndex = 1;
            });
            activeHexId = null;
            document.removeEventListener('pointermove', handlePointerMove);
            document.removeEventListener('pointerup', handlePointerUp);
        }

        function getConnectedCluster(startId) {
            let cluster = new Set(); let queue = [startId];
            while(queue.length > 0) {
                let curr = queue.shift();
                if(!cluster.has(curr)) {
                    cluster.add(curr);
                    const currHex = hexagonsData.find(h => h.id === curr);
                    hexagonsData.forEach(h => {
                        if(h.id !== curr && !cluster.has(h.id)) {
                            const dist = Math.sqrt(Math.pow(currHex.x - h.x, 2) + Math.pow(currHex.y - h.y, 2));
                            if(dist < (140 * currentScale)) queue.push(h.id);
                        }
                    });
                }
            }
            return Array.from(cluster);
        }

        function openModal(id) {
            currentEditingId = id; const hex = hexagonsData.find(h => h.id === id);
            document.getElementById('modalTitle').innerText = hex.word;
            document.getElementById('noteText').value = hex.notes || "";
            document.getElementById('modalColorPicker').value = hex.theme || "clay";
            document.getElementById('noteModal').style.display = 'block';
            document.getElementById('modalOverlay').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('noteModal').style.display = 'none'; document.getElementById('modalOverlay').style.display = 'none';
        }

        function saveNote() {
            const hex = hexagonsData.find(h => h.id === currentEditingId);
            hex.notes = document.getElementById('noteText').value;
            hex.theme = document.getElementById('modalColorPicker').value;
            closeModal(); renderBoard();
        }

        function deleteHexagon() {
            if (confirm("Delete this hexagon?")) { hexagonsData = hexagonsData.filter(h => h.id !== currentEditingId); closeModal(); renderBoard(); }
        }

        function clearBoard() { if (confirm("Clear the entire board?")) { hexagonsData = []; renderBoard(); } }

        function downloadBoard() {
            if (hexagonsData.length === 0) return alert("The board is empty!");
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(hexagonsData));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            // CHANGED: .json to .hexmap
            downloadAnchorNode.setAttribute("download", "my_hexagon_board.hexmap");
            document.body.appendChild(downloadAnchorNode); 
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        function loadBoard(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    hexagonsData = JSON.parse(e.target.result); renderBoard();
                    alert("Board loaded successfully!");
                } catch (err) { alert("Oops! That doesn't look like a valid board file."); }
            };
            reader.readAsText(file);
            event.target.value = ''; 
        }

        function printNotes() {
            if (hexagonsData.length === 0) return alert("The board is empty!");

            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            const hexW = 120 * currentScale; const hexH = 138 * currentScale;
            
            hexagonsData.forEach(hex => {
                if (hex.x < minX) minX = hex.x; if (hex.y < minY) minY = hex.y;
                if (hex.x > maxX) maxX = hex.x; if (hex.y > maxY) maxY = hex.y;
            });

            const hexElements = document.querySelectorAll('.hexagon');
            hexElements.forEach(el => {
                const id = parseInt(el.dataset.id);
                const hex = hexagonsData.find(h => h.id === id);
                el.dataset.origLeft = el.style.left; el.dataset.origTop = el.style.top;
                
                el.style.left = (hex.x - minX + 20) + 'px'; 
                el.style.top = (hex.y - minY + 20) + 'px';
            });

            let boardWidth = (maxX - minX) + hexW + 40;
            let boardHeight = (maxY - minY) + hexH + 40;
            board.dataset.origWidth = board.style.width; board.dataset.origHeight = board.style.height;
            board.style.width = boardWidth + 'px'; board.style.height = boardHeight + 'px';

            if (boardWidth > 750) {
                const scaleDown = 750 / boardWidth;
                board.style.transform = `scale(${scaleDown})`;
                board.style.transformOrigin = 'top left';
            }

            const notesContainer = document.createElement('div');
            notesContainer.id = 'printNotesContainer';
            let notesHtml = `<h2 style="color: #4A3F35; margin-bottom: 5px;">Hexagonal Thinking: Explanations</h2><hr style="border: 1px solid #D4C5B9; margin-bottom: 20px;">`;
            
            let sortedData = [...hexagonsData].sort((a, b) => a.word.localeCompare(b.word));
            sortedData.forEach(hex => {
                const noteContent = hex.notes ? hex.notes.replace(/\n/g, '<br>') : '<em>No notes added.</em>';
                notesHtml += `
                    <div style="margin-bottom: 15px; padding: 15px; border: 1px solid #D4C5B9; border-radius: 8px; background: #FAFAF8; page-break-inside: avoid;">
                        <div style="font-weight: bold; font-size: 18px; color: #C18C5D; margin-bottom: 5px;">${hex.word}</div>
                        <span style="font-size: 12px; color: #7A8B76; text-transform: uppercase;">Theme: ${hex.theme}</span>
                        <div style="margin-top: 10px; color:#4A3F35; font-size: 14px;">${noteContent}</div>
                    </div>`;
            });
            notesContainer.innerHTML = notesHtml;
            document.body.appendChild(notesContainer);

            document.body.classList.add('printing-mode');

            setTimeout(() => {
                window.print();
                
                document.body.classList.remove('printing-mode');
                document.body.removeChild(notesContainer);
                board.style.transform = 'none';
                board.style.width = board.dataset.origWidth || '3000px';
                board.style.height = board.dataset.origHeight || '3000px';
                
                hexElements.forEach(el => { el.style.left = el.dataset.origLeft; el.style.top = el.dataset.origTop; });
            }, 500);
        }
    </script>
</body>
</html>
